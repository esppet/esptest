<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    :root {
      --bg: #faf8ef;
      --grid-bg: #bbada0;
      --cell-bg: #cdc1b4;
      --text-dark: #776e65;
      --text-light: #f9f6f2;
      --accent: #8f7a66;
      --new-btn: #8f7a66;
      --score-bg: #bbada0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text-dark);
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      user-select: none;
    }

    .container {
      width: min(500px, 100%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 20px;
      gap: 12px;
    }

    .title-block h1 {
      font-size: clamp(48px, 12vw, 80px);
      font-weight: 700;
      line-height: 1;
      color: var(--text-dark);
    }

    .title-block p {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.4;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score-box {
      background: var(--score-bg);
      color: var(--text-light);
      border-radius: 6px;
      padding: 8px 16px;
      text-align: center;
      min-width: 70px;
    }

    .score-box .label {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .score-box .value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .controls p {
      font-size: 14px;
      flex: 1;
    }

    button {
      background: var(--new-btn);
      color: var(--text-light);
      border: none;
      border-radius: 6px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.15s;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      filter: brightness(0.95);
    }

    .game-wrapper {
      position: relative;
    }

    .grid-container {
      background: var(--grid-bg);
      border-radius: 8px;
      padding: 12px;
      position: relative;
      touch-action: none;
    }

    .grid-bg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      aspect-ratio: 1;
    }

    .cell {
      background: var(--cell-bg);
      border-radius: 6px;
    }

    .tile-container {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      border-radius: 6px;
      transition: top 0.14s ease-out, left 0.14s ease-out;
      z-index: 10;
    }

    .tile.new {
      animation: pop 0.18s ease-out forwards;
    }

    .tile.merged {
      animation: merge 0.18s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: scale(0.85); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes merge {
      0% { transform: scale(1); }
      40% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .tile-2    { background: #eee4da; color: var(--text-dark); }
    .tile-4    { background: #ede0c8; color: var(--text-dark); }
    .tile-8    { background: #f2b179; color: var(--text-light); }
    .tile-16   { background: #f59563; color: var(--text-light); }
    .tile-32   { background: #f67c5f; color: var(--text-light); }
    .tile-64   { background: #f65e3b; color: var(--text-light); }
    .tile-128  { background: #edcf72; color: var(--text-light); font-size: 0.9em; box-shadow: 0 0 20px rgba(243, 215, 116, 0.4); }
    .tile-256  { background: #edcc61; color: var(--text-light); font-size: 0.9em; box-shadow: 0 0 20px rgba(243, 215, 116, 0.5); }
    .tile-512  { background: #edc850; color: var(--text-light); font-size: 0.9em; box-shadow: 0 0 20px rgba(243, 215, 116, 0.6); }
    .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 0.75em; box-shadow: 0 0 20px rgba(243, 215, 116, 0.7); }
    .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 0.75em; box-shadow: 0 0 30px rgba(243, 215, 116, 0.8); }
    .tile-super { background: #3c3a32; color: var(--text-light); font-size: 0.65em; }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.73);
      border-radius: 8px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }

    .overlay.visible {
      display: flex;
    }

    .overlay h2 {
      font-size: 48px;
      font-weight: 700;
    }

    .overlay p {
      font-size: 16px;
    }

    .overlay .buttons {
      display: flex;
      gap: 10px;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      opacity: 0.7;
    }

    kbd {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title-block">
        <h1>2048</h1>
        <p>Join the tiles, get to <strong>2048!</strong></p>
      </div>
      <div class="scores">
        <div class="score-box">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="controls">
      <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move tiles.</p>
      <button id="new-game">New Game</button>
    </div>

    <div class="game-wrapper">
      <div class="grid-container" id="grid-container">
        <div class="grid-bg" id="grid-bg"></div>
        <div class="tile-container" id="tile-container"></div>
      </div>

      <div class="overlay" id="game-over-overlay">
        <h2>Game Over!</h2>
        <p>No more moves available.</p>
        <div class="buttons">
          <button id="try-again">Try Again</button>
        </div>
      </div>

      <div class="overlay" id="win-overlay">
        <h2>You Win!</h2>
        <p>You reached 2048!</p>
        <div class="buttons">
          <button id="keep-playing">Keep Going</button>
          <button id="new-game-win">New Game</button>
        </div>
      </div>
    </div>

    <footer>Double-click <strong>launch.bat</strong> on Windows to play.</footer>
  </div>

  <script>
    const SIZE = 4;
    const BEST_KEY = '2048-best-score';

    let grid = [];
    let tiles = [];
    let score = 0;
    let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    let won = false;
    let keepPlaying = false;
    let tileId = 0;
    let cellSize = 0;
    let gap = 12;
    let animating = false;

    const gridBg = document.getElementById('grid-bg');
    const tileContainer = document.getElementById('tile-container');
    const gridContainer = document.getElementById('grid-container');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const winOverlay = document.getElementById('win-overlay');

    function init() {
      for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        gridBg.appendChild(cell);
      }
      bestEl.textContent = best;
      newGame();
      window.addEventListener('resize', updateSizes);
      updateSizes();
    }

    function updateSizes() {
      const rect = gridContainer.getBoundingClientRect();
      const padding = 12;
      const totalGap = gap * (SIZE - 1);
      const available = rect.width - padding * 2 - totalGap;
      cellSize = available / SIZE;

      tiles.forEach(tile => positionTile(tile));
    }

    function newGame() {
      grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      tiles = [];
      tileContainer.innerHTML = '';
      score = 0;
      won = false;
      keepPlaying = false;
      gameOverOverlay.classList.remove('visible');
      winOverlay.classList.remove('visible');
      updateScore();
      addRandomTile();
      addRandomTile();
      render();
    }

    function emptyCells() {
      const cells = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (!grid[r][c]) cells.push({ r, c });
        }
      }
      return cells;
    }

    function addRandomTile() {
      const empty = emptyCells();
      if (!empty.length) return;
      const { r, c } = empty[Math.floor(Math.random() * empty.length)];
      const value = Math.random() < 0.9 ? 2 : 4;
      const tile = { id: tileId++, r, c, value, isNew: true, merged: false };
      grid[r][c] = tile;
      tiles.push(tile);
    }

    function tileClass(value) {
      if (value <= 2048) return `tile-${value}`;
      return 'tile-super';
    }

    function fontSize(value) {
      const base = cellSize * 0.45;
      if (value < 100) return base;
      if (value < 1000) return base * 0.8;
      if (value < 10000) return base * 0.65;
      return base * 0.5;
    }

    function positionTile(tile) {
      const el = document.getElementById(`tile-${tile.id}`);
      if (!el) return;
      el.style.width = `${cellSize}px`;
      el.style.height = `${cellSize}px`;
      el.style.top = `${tile.r * (cellSize + gap)}px`;
      el.style.left = `${tile.c * (cellSize + gap)}px`;
      el.style.fontSize = `${fontSize(tile.value)}px`;
    }

    function render() {
      const existing = new Set(tiles.map(t => t.id));

      document.querySelectorAll('.tile').forEach(el => {
        const id = parseInt(el.id.replace('tile-', ''), 10);
        if (!existing.has(id)) el.remove();
      });

      tiles.forEach(tile => {
        let el = document.getElementById(`tile-${tile.id}`);
        if (!el) {
          el = document.createElement('div');
          el.id = `tile-${tile.id}`;
          el.className = `tile ${tileClass(tile.value)}`;
          if (tile.isNew) el.classList.add('new');
          if (tile.merged) el.classList.add('merged');
          el.textContent = tile.value;
          tileContainer.appendChild(el);
        } else {
          el.className = `tile ${tileClass(tile.value)}`;
          el.textContent = tile.value;
          if (tile.merged) {
            el.classList.add('merged');
            setTimeout(() => el.classList.remove('merged'), 180);
          }
        }
        positionTile(tile);
        tile.isNew = false;
      });
    }

    function updateScore() {
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem(BEST_KEY, best);
      }
    }

    function slideLine(line) {
      const before = line.map(t => t ? t.value : null);
      const filtered = line.filter(t => t !== null);
      const merged = [];
      let lineScore = 0;

      for (let i = 0; i < filtered.length; i++) {
        if (i + 1 < filtered.length && filtered[i].value === filtered[i + 1].value) {
          const newValue = filtered[i].value * 2;
          const mergedTile = {
            id: tileId++,
            value: newValue,
            merged: true,
            isNew: false,
            r: filtered[i].r,
            c: filtered[i].c
          };
          merged.push(mergedTile);
          lineScore += newValue;

          const removed = [filtered[i], filtered[i + 1]];
          removed.forEach(t => {
            const idx = tiles.findIndex(x => x.id === t.id);
            if (idx !== -1) tiles.splice(idx, 1);
          });

          i++;
        } else {
          merged.push(filtered[i]);
        }
      }

      while (merged.length < SIZE) merged.push(null);
      const after = merged.map(t => t ? t.value : null);
      const moved = before.some((value, i) => value !== after[i]);
      return { line: merged, score: lineScore, moved };
    }

    function getVector(direction) {
      const map = {
        up:    { dr: -1, dc: 0,  rowMajor: false },
        down:  { dr: 1,  dc: 0,  rowMajor: false },
        left:  { dr: 0,  dc: -1, rowMajor: true },
        right: { dr: 0,  dc: 1,  rowMajor: true }
      };
      return map[direction];
    }

    function move(direction) {
      if (animating) return;

      const { rowMajor } = getVector(direction);
      const reverse = direction === 'down' || direction === 'right';
      let moved = false;
      let gained = 0;

      if (rowMajor) {
        for (let r = 0; r < SIZE; r++) {
          const line = [];
          for (let c = 0; c < SIZE; c++) {
            const tile = grid[r][c];
            if (tile) {
              tile.r = r;
              tile.c = c;
            }
            line.push(tile);
          }

          if (reverse) line.reverse();
          const result = slideLine(line);
          if (reverse) result.line.reverse();
          if (result.moved) moved = true;
          gained += result.score;

          for (let c = 0; c < SIZE; c++) {
            const tile = result.line[c];
            grid[r][c] = tile;
            if (tile) {
              tile.r = r;
              tile.c = c;
              if (!tiles.find(t => t.id === tile.id)) tiles.push(tile);
            }
          }
        }
      } else {
        for (let c = 0; c < SIZE; c++) {
          const line = [];
          for (let r = 0; r < SIZE; r++) {
            const tile = grid[r][c];
            if (tile) {
              tile.r = r;
              tile.c = c;
            }
            line.push(tile);
          }

          if (reverse) line.reverse();
          const result = slideLine(line);
          if (reverse) result.line.reverse();
          if (result.moved) moved = true;
          gained += result.score;

          for (let r = 0; r < SIZE; r++) {
            const tile = result.line[r];
            grid[r][c] = tile;
            if (tile) {
              tile.r = r;
              tile.c = c;
              if (!tiles.find(t => t.id === tile.id)) tiles.push(tile);
            }
          }
        }
      }

      if (!moved) return;

      animating = true;
      score += gained;
      updateScore();
      render();

      setTimeout(() => {
        addRandomTile();
        render();
        animating = false;

        if (!won && tiles.some(t => t.value === 2048)) {
          won = true;
          if (!keepPlaying) winOverlay.classList.add('visible');
        }

        if (!canMove()) {
          gameOverOverlay.classList.add('visible');
        }
      }, 150);
    }

    function canMove() {
      if (emptyCells().length > 0) return true;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = grid[r][c]?.value;
          if (c + 1 < SIZE && grid[r][c + 1]?.value === val) return true;
          if (r + 1 < SIZE && grid[r + 1][c]?.value === val) return true;
        }
      }
      return false;
    }

    document.addEventListener('keydown', (e) => {
      const keyMap = {
        ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
        w: 'up', s: 'down', a: 'left', d: 'right',
        W: 'up', S: 'down', A: 'left', D: 'right'
      };
      if (keyMap[e.key]) {
        e.preventDefault();
        move(keyMap[e.key]);
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;

    gridContainer.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    gridContainer.addEventListener('touchend', (e) => {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const minSwipe = 30;

      if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
    }, { passive: true });

    document.getElementById('new-game').addEventListener('click', newGame);
    document.getElementById('try-again').addEventListener('click', newGame);
    document.getElementById('new-game-win').addEventListener('click', newGame);
    document.getElementById('keep-playing').addEventListener('click', () => {
      keepPlaying = true;
      winOverlay.classList.remove('visible');
    });

    init();
  </script>
</body>
</html>
